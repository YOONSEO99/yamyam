<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-logo"><span class="logo-yam">yam</span>yam</div>
    <h1>Create your account</h1>
    <p class="auth-sub">Start learning — or start teaching</p>

    <div class="role-toggle">
      <button [class.active]="form.role === 'student'" (click)="form.role = 'student'">
        🎓 I'm a Student
      </button>
      <button [class.active]="form.role === 'instructor'" (click)="form.role = 'instructor'">
        👨‍🏫 I'm an Instructor
      </button>
    </div>

    @if (error()) {
      <div class="error-banner">{{ error() }}</div>
    }

    <div class="form-group">
      <label>Display Name *</label>
      <input type="text" [(ngModel)]="form.nickname" placeholder="Your name" />
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" [(ngModel)]="form.email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password *</label>
      <input type="password" [(ngModel)]="form.password" placeholder="Min. 8 characters" />
      <span class="hint">Include letters, numbers, and a special character</span>
    </div>

    <button class="btn-primary full-btn" (click)="submit()" [disabled]="loading()">
      {{ loading() ? 'Creating account...' : 'Create Account' }}
    </button>

    <p class="auth-switch">
      Already have an account? <a routerLink="/login">Log in</a>
    </p>
  </div>
</div>
