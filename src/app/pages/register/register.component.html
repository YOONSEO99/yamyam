<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-logo"><span class="logo-yam">yam</span>yam</div>
    <h1>Create your account</h1>
    <p class="auth-sub">Start learning — or start teaching</p>


    @if (error()) {
      <div class="error-banner">{{ error() }}</div>
    }


    <div class="form-group">
      <label>First Name *</label>
      <input type="text" [(ngModel)]="form.firstName" placeholder="Your first name" />
    </div>
    <div class="form-group">
      <label>Last Name *</label>
      <input type="text" [(ngModel)]="form.lastName" placeholder="Your last name" />
    </div>
    <div class="form-group">
      <label>Birth Date *</label>
      <input type="date" [(ngModel)]="form.birthDate" />
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" [(ngModel)]="form.email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password *</label>
      <input type="password" [(ngModel)]="form.password" placeholder="Min. 8 characters" />
      <span class="hint">Include letters, numbers, and a special character</span>
    </div>
    <div class="form-group">
      <label>Nickname(Optional)</label>
      <input type="text" [(ngModel)]="form.nickname" placeholder="Your nickname" />
    </div>

    <button class="btn-primary full-btn" (click)="submit()" [disabled]="loading()">
      {{ loading() ? 'Creating account...' : 'Create Account' }}
    </button>

    <p class="auth-switch">
      Already have an account? <a routerLink="/login">Log in</a>
    </p>
  </div>
</div>
