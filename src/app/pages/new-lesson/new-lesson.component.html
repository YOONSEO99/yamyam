<div class="page-wrapper">
  <div class="container form-page">
    <div class="form-header">
      <h1>Create a New Lesson</h1>
      <p>Share your expertise with students worldwide</p>
    </div>

    <div class="card form-card">
      <div class="form-group">
        <label for="title">Lesson Title *</label>
        <input
          id="title"
          type="text"
          [(ngModel)]="form.title"
          placeholder="e.g. React 19 Complete Bootcamp"
        />
      </div>

      <div class="form-group">
        <label for="category">Category *</label>
        <select id="category" [(ngModel)]="form.category">
          <option value="" disabled>Select a category</option>
          @for (cat of categories; track cat) {
            <option [value]="cat">{{ cat }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="desc">Description</label>
        <textarea
          id="desc"
          [(ngModel)]="form.description"
          rows="5"
          placeholder="Describe what students will learn..."
        ></textarea>
      </div>

      <div class="form-group form-grid-half">
        <div class="input-wrap">
          <label for="price">Price ($) *</label>
          <input
            id="price"
            type="number"
            [(ngModel)]="form.price"
            placeholder="e.g. 50"
          />
        </div>
        <div class="input-wrap">
          <label for="maxCapacity">Max Capacity *</label>
          <input
            id="maxCapacity"
            type="number"
            [(ngModel)]="form.maxCapacity"
            placeholder="e.g. 10"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Schedule *</label>
        <div class="schedule-inputs">
          <input type="date" [(ngModel)]="form.startDate" />
          <span class="separator">at</span>
          <input type="time" [(ngModel)]="form.startTime" />
          <span class="separator">~</span>
          <input type="time" [(ngModel)]="form.endTime" />
        </div>
      </div>

      <div class="form-group">
        <label>Location *</label>
        <div class="location-inputs">
          <div class="loc-row-top">
            <input
              type="text"
              [(ngModel)]="form.streetNumber"
              placeholder="Street No. (e.g. 123)"
            />
            <input
              type="text"
              [(ngModel)]="form.streetName"
              placeholder="Street Name (e.g. Water St)"
            />
          </div>
          <div class="loc-row-bottom">
            <input
              type="text"
              [(ngModel)]="form.city"
              placeholder="City (e.g. Vancouver)"
            />
            <input
              type="text"
              [(ngModel)]="form.postalCode"
              placeholder="Postal Code"
            />
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Thumbnail</label>
        <div class="upload-zone">
          <div class="upload-icon">📁</div>
          <p>Drag & drop or <span>browse</span></p>
          <span class="upload-hint">PNG, JPG up to 5MB</span>
        </div>
      </div>

      <div class="form-actions">
        <button
          class="btn-ghost"
          (click)="submit('draft')"
          [disabled]="saving()"
        >
          Save as Draft
        </button>
        <button
          class="btn-primary"
          (click)="submit('published')"
          [disabled]="saving()"
        >
          {{ saving() ? "Creating..." : "Publish Lesson" }}
        </button>
      </div>
    </div>
  </div>
</div>
