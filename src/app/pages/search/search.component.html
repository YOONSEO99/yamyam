<div class="page-wrapper">
  <div class="container">
    <div class="search-header">
      <h1 class="page-title">Find a Class</h1>
      <div class="search-bar">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          placeholder="Search classes..."
          (keyup.enter)="onSearch()"
        />
        <button (click)="onSearch()">Search</button>
      </div>
    </div>

    <app-category-bar (categorySelected)="onCategorySelected($event)" />

    <div class="results-meta">
      <span class="results-count">{{ totalCount() }} classes found</span>
      @if (activeCategory) {
        <span class="active-filter">
          {{ activeCategory }}
          <button (click)="onCategorySelected('')">×</button>
        </span>
      }
    </div>

    @if (lessons().length > 0) {
      <div class="cards-grid">
        @for (l of lessons(); track l._id) {
          <app-lesson-card
            [lesson]="l"
            (favouriteToggled)="onFavouriteToggled($event)"
          />
        }
      </div>
    } @else {
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <h3>No lessons found</h3>
        <p>Try a different keyword or browse by category.</p>
        <button
          class="btn-outline"
          (click)="searchQuery = ''; onCategorySelected('')"
        >
          Clear filters
        </button>
      </div>
    }
  </div>
</div>
