<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-logo"><span class="logo-yam">yam</span>yam</div>
    <h1>Welcome back</h1>
    <p class="auth-sub">Log in to continue learning</p>

    @if (error()) {
      <div class="error-banner">{{ error() }}</div>
    }

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="form.email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="form.password" placeholder="••••••••" (keyup.enter)="submit()" />
    </div>

    <button class="btn-primary full-btn" (click)="submit()" [disabled]="loading()">
      {{ loading() ? 'Logging in...' : 'Log In' }}
    </button>

    <p class="auth-switch">
      Don't have an account? <a routerLink="/register">Sign up free</a>
    </p>
  </div>
</div>
