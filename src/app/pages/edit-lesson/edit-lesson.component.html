<div class="page-wrapper">
  <div class="container form-page">
    @if (loading()) {
      <p style="color: var(--text-secondary)">Loading…</p>
    } @else if (loadError()) {
      <p style="color: var(--text-secondary)">레슨을 불러오지 못했습니다.</p>
      <a routerLink="/my-lessons" class="btn-primary">내 레슨으로</a>
    } @else {
      <div class="form-header">
        <h1>Edit Lesson</h1>
        <p>Update your lesson details</p>
      </div>

      <div class="card form-card">
        <div class="form-group">
          <label for="title">Lesson Title *</label>
          <input
            id="title"
            type="text"
            [(ngModel)]="form.title"
            placeholder="e.g. React 19 Complete Bootcamp"
          />
        </div>

        <div class="form-group">
          <label for="category">Category *</label>
          <select id="category" [(ngModel)]="form.category">
            <option value="" disabled>Select a category</option>
            @for (cat of categories; track cat) {
              <option [value]="cat">{{ cat }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="desc">Description</label>
          <textarea
            id="desc"
            [(ngModel)]="form.description"
            rows="5"
            placeholder="Describe what students will learn..."
          ></textarea>
        </div>

        <div class="form-group">
          <label>Thumbnail</label>
          <div class="upload-zone">
            <div class="upload-icon">📁</div>
            <p>Drag & drop or <span>browse</span></p>
            <span class="upload-hint">PNG, JPG up to 5MB</span>
          </div>
        </div>

        <div class="form-group">
          <label>Status</label>
          <div class="radio-group">
            <label class="radio-opt">
              <input type="radio" [(ngModel)]="form.status" value="draft" /> Draft
            </label>
            <label class="radio-opt">
              <input type="radio" [(ngModel)]="form.status" value="published" />
              Published
            </label>
          </div>
        </div>

        @if (saveError()) {
          <p style="color: var(--danger, #c0392b); font-size: 14px">
            저장에 실패했습니다. 다시 시도해 주세요.
          </p>
        }

        <div class="form-actions">
          <a [routerLink]="['/lessons', lessonId]" class="btn-ghost">Cancel</a>
          <button class="btn-primary" (click)="submit()" [disabled]="saving()">
            {{ saving() ? "Saving…" : "Save changes" }}
          </button>
        </div>
      </div>
    }
  </div>
</div>
