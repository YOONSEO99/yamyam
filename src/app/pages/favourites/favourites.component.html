<div class="page-wrapper">
  <div class="container">
    <h1 class="page-title">Saved Classes</h1>
    @if (classes().length > 0) {
      <div class="cards-grid">
        @for (c of classes(); track c._id) {
          <app-class-card [class]="c" (favouriteToggled)="onFavouriteToggled($event)" />
        }
      </div>
    } @else {
      <div class="empty-state">
        <div class="empty-icon">♡</div>
        <h3>Nothing saved yet</h3>
        <p>Tap the heart on any class to save it here</p>
        <a routerLink="/search" class="btn-primary">Browse Classes</a>
      </div>
    }
  </div>
</div>
